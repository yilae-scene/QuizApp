<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="styles.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0
    ,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,
    200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
          rel="stylesheet">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <title>Quiz app</title>
</head>
<body><h1>
    Quiz Time</h1>
<main class="quiz-container">
    <div class="quiz-container__questions">
        <div class="quiz-container__Qindicator">
            <h6>Question: <span></span></h6>
        </div>
        <div class="quiz-container__Question">
            <p></p>
        </div>
    </div>
    <div class="quiz-container__choices">

    </div>
    <div class="quiz-container__result"></div>
    <div class="quiz-container__navigate">
        <button class="previousBtn active">
            <i class="fa fa-arrow-circle-left" aria-hidden="true"></i>
        </button>
        <button class="nextBtn active">
            <i class="fa fa-arrow-circle-right" aria-hidden="true"></i>
        </button>
    </div>
    <div class="progress-bar">
        <p></p>
    </div>
    <script src="script.js"></script>
</main>
</body>
</html>
